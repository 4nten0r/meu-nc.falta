<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NC Faltas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>.screen { display: none; } .screen.active { display: block; }</style>
</head>
<body class="bg-gray-100 font-sans">
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg p-6 border-t-8 border-[#C2410C]">
    
    <div id="filial" class="screen active block">
      <h2 class="text-2xl font-bold text-[#C2410C] mb-6">NC Falta - Filial</h2>
      <div id="list-filiais" class="space-y-3"></div>
    </div>

    <div id="motorista" class="screen hidden">
      <button onclick="goTo('filial')" class="text-orange-700 font-bold mb-4">← Voltar</button>
      <h2 class="text-2xl font-bold text-[#C2410C] mb-6">Seleccione o Motorista</h2>
      <div id="list-motoristas" class="space-y-3"></div>
    </div>

    <div id="ocorrencias" class="screen hidden">
      <button onclick="goTo('motorista')" class="text-orange-700 font-bold mb-4">← Voltar</button>
      <h2 class="text-2xl font-bold text-[#C2410C] mb-6">Ocorrências (Faltas)</h2>
      <div id="list-ocorrencias" class="space-y-4"></div>
    </div>

    <div id="form" class="screen hidden">
      <div class="flex flex-col h-[90vh] max-h-screen">
        <button onclick="goTo('ocorrencias')" class="text-orange-700 font-bold mb-2 shrink-0 text-left">← Voltar para Lista</button>
        
        <p id="desc-ocorrencia" class="p-3 bg-orange-50 border border-orange-200 rounded-lg text-sm mb-4 whitespace-pre-line overflow-y-auto max-h-32 shrink-0 text-gray-700"></p>
        
        <div class="space-y-3 overflow-y-auto pb-6 pr-1 flex-grow">
          <div>
            <label class="text-xs font-bold text-[#C2410C]">ANÁLISE</label>
            <textarea id="inp-analise" rows="2" class="w-full p-2 border rounded-lg bg-gray-50 focus:bg-white"></textarea>
          </div>
          <div>
            <label class="text-xs font-bold text-[#C2410C]">AÇÕES</label>
            <textarea id="inp-acoes" rows="2" class="w-full p-2 border rounded-lg bg-gray-50 focus:bg-white"></textarea>
          </div>
          <div>
            <label class="text-xs font-bold text-[#C2410C]">AÇÃO PREVENTIVA</label>
            <textarea id="inp-preventiva" rows="2" class="w-full p-2 border rounded-lg bg-gray-50 focus:bg-white"></textarea>
          </div>

          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-xs font-bold text-[#C2410C]">RESPONSÁVEL</label>
              <input id="inp-resp" type="text" class="w-full p-2 border rounded-lg bg-gray-50 focus:bg-white">
            </div>
            <div>
              <label class="text-xs font-bold text-[#C2410C]">PERÍODO</label>
              <input id="inp-periodo" type="text" placeholder="Ex: Manhã" class="w-full p-2 border rounded-lg bg-gray-50 focus:bg-white">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="text-xs font-bold text-[#C2410C]">PRAZO</label>
              <input id="inp-prazo" type="date" class="w-full p-2 border rounded-lg bg-gray-50 focus:bg-white">
            </div>
            <div>
              <label class="text-xs font-bold text-[#C2410C]">REALIZADO</label>
              <input id="inp-realizado" type="date" class="w-full p-2 border rounded-lg bg-gray-50 focus:bg-white">
            </div>
          </div>

          <div>
            <label class="text-xs font-bold text-[#C2410C]">STATUS</label>
            <select id="inp-status" class="w-full p-2 border rounded-lg bg-gray-50 focus:bg-white text-sm">
              <option value="Pendente">Pendente</option>
              <option value="Em Andamento">Em Andamento</option>
              <option value="Concluído">Concluído</option>
            </select>
          </div>

          <button onclick="salvar()" class="w-full bg-[#C2410C] hover:bg-orange-800 text-white py-4 rounded-xl font-bold shadow-md mt-4 transition-colors">
            Salvar Tratativa
          </button>
        </div>
      </div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
